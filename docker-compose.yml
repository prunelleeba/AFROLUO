# ══════════════════════════════════════════════════════════════
#  docker-compose.yml — Orchestration des services
# ══════════════════════════════════════════════════════════════
#
#  RÔLE DE DOCKER COMPOSE :
#  Lance PLUSIEURS containers en même temps et les connecte.
#  Ici : 1 container PostgreSQL + 1 container FastAPI
#
#  COMMANDES :
#    Démarrer :    docker compose up -d
#    Arrêter :     docker compose down
#    Voir logs :   docker compose logs -f api
#    Reconstruire: docker compose up -d --build
#
#  SCHÉMA :
#    Flutter App
#        ↓ HTTP :8000
#    [api container - FastAPI]
#        ↓ TCP :5432
#    [db container - PostgreSQL]
#        ↓ Volume
#    [postgres_data - stockage permanent]
# ══════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── SERVICE 1 : Base de données PostgreSQL ──────────────────
  db:
    image: postgres:16-alpine       # PostgreSQL v16, image légère
    container_name: afroluo_db
    restart: unless-stopped         # Redémarre si crash

    environment:
      POSTGRES_DB: afroluo_db       # Nom de la base de données
      POSTGRES_USER: afroluo_user   # Nom d'utilisateur PostgreSQL
      POSTGRES_PASSWORD: afroluo_pass  # Mot de passe PostgreSQL

    volumes:
      # Les données PostgreSQL survivent aux redémarrages
      - postgres_data:/var/lib/postgresql/data
      # Script SQL exécuté à la première création
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      # Rend PostgreSQL accessible depuis ton PC pour pgAdmin/DBeaver
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afroluo_user -d afroluo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SERVICE 2 : API FastAPI ──────────────────────────────────
  api:
    build:
      context: .           # Cherche le Dockerfile dans le dossier actuel
      dockerfile: Dockerfile
    container_name: afroluo_api
    restart: unless-stopped

    environment:
      # Surcharge les variables du .env pour Docker
      DATABASE_URL: postgresql+asyncpg://afroluo_user:afroluo_pass@db:5432/afroluo_db
      #                                                               ↑
      #                   Ici "db" = nom du service PostgreSQL ci-dessus
      SECRET_KEY: change_me_in_production_use_a_real_secret_key_here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      DEBUG: "false"
      ALLOWED_ORIGINS: '["*"]'
      UPLOAD_DIR: /app/uploads

    volumes:
      # Les fichiers uploadés survivent aux redémarrages
      - ./uploads:/app/uploads

    ports:
      # Mappe le port 8000 du container sur le port 8000 de ton PC
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy  # Attend que PostgreSQL soit prêt

  # ── SERVICE 3 (optionnel) : pgAdmin ─────────────────────────
  # Interface web pour visualiser la base de données
  # Accès : http://localhost:5050
  # Login : admin@afroluo.com / admin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: afroluo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@afroluo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools  # Lance seulement avec : docker compose --profile tools up

# ── VOLUMES — stockage persistant ───────────────────────────
volumes:
  postgres_data:
    driver: local

# ── RÉSEAU — communication entre containers ─────────────────
networks:
  default:
    name: afroluo_network

# ══════════════════════════════════════════════════════════════
#  alembic.ini — Configuration des migrations de base de données
# ══════════════════════════════════════════════════════════════
#
#  RÔLE D'ALEMBIC :
#  Quand tu modifies un modèle SQLAlchemy (ex: ajouter une colonne),
#  Alembic génère un script SQL de migration.
#  C'est comme "git" pour la structure de ta base de données.
#
#  COMMANDES UTILES :
#  Créer une migration :  alembic revision --autogenerate -m "Ajout colonne X"
#  Appliquer :            alembic upgrade head
#  Annuler dernière :     alembic downgrade -1
#  Voir l'historique :    alembic history
# ══════════════════════════════════════════════════════════════

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# URL de la base — remplacée par la variable d'environnement dans env.py
sqlalchemy.url = postgresql+asyncpg://afroluo_user:afroluo_pass@localhost:5432/afroluo_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
